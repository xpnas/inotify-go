server {
  listen 80;
  server_name _;

  root /usr/share/nginx/html;
  index index.html;

  client_max_body_size 2m;

  location /api/ {
    proxy_pass http://backend:8000/api/;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  location = /Register {
    proxy_pass http://backend:8000/Register;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  location = /RegisterCheck {
    proxy_pass http://backend:8000/RegisterCheck;
    proxy_set_header Host $host;
  }

  location = /Ping {
    proxy_pass http://backend:8000/Ping;
  }

  location = /Healthz {
    proxy_pass http://backend:8000/Healthz;
  }

  location = /Info {
    proxy_pass http://backend:8000/Info;
  }

  location ~ ^/[A-Fa-f0-9]{32}/ {
    proxy_pass http://backend:8000;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  location / {
    try_files $uri $uri/ /index.html;
  }
}
