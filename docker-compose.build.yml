services:
  inotify:
    build:
      context: .
      dockerfile: Dockerfile
    image: inotify:local
    restart: unless-stopped
    environment:
      INOTIFY_ADDR: ":8000"
      INOTIFY_DATA_DIR: "/app/inotify_data"
    volumes:
      - inotify_data:/app/inotify_data
    ports:
      - "${INOTIFY_HTTP_PORT:-9000}:8000"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:8000/Healthz"]
      interval: 30s
      timeout: 5s
      retries: 3

volumes:
  inotify_data:
